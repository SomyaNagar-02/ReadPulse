<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadFlow</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 320px;
        margin: 0;
        padding: 18px;
        background: #0f1115;
        color: #ffffff;
      }

      .popup-card {
        background: #1a1d24;
        border: 1px solid #2a2f3a;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
      }

      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }

      p {
        font-size: 14px;
        margin: 0 0 16px;
        line-height: 1.4;
        color: #b8bec9;
      }

      #message {
        min-height: 20px;
        margin-top: 12px;
        font-size: 13px;
      }

      .popup-section {
        display: none;
      }

      .popup-section.active {
        display: block;
      }

      .popup-form {
        display: grid;
        gap: 12px;
      }

      .mode-row,
      .time-options {
        display: grid;
        gap: 10px;
      }

      .time-options {
        grid-template-columns: repeat(3, 1fr);
        margin-bottom: 14px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #2a2f3a;
        border-radius: 10px;
        background: #11141a;
        color: #ffffff;
        font: inherit;
      }

      input::placeholder {
        color: #8b93a1;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        background: #6c5ce7;
        color: #ffffff;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      button:hover {
        opacity: 0.94;
        transform: translateY(-1px);
      }

      .secondary-button {
        margin-top: 10px;
        background: rgba(108, 92, 231, 0.16);
        border: 1px solid rgba(108, 92, 231, 0.35);
      }

      .time-button {
        padding: 10px;
        background: rgba(108, 92, 231, 0.16);
        border: 1px solid rgba(108, 92, 231, 0.35);
      }

      .suggestion-list {
        display: grid;
        gap: 10px;
      }

      .suggestion-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid #2a2f3a;
        border-radius: 12px;
        background: #11141a;
      }

      .suggestion-item strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        line-height: 1.3;
      }

      .suggestion-item span {
        display: block;
        color: #b8bec9;
        font-size: 12px;
      }

      .suggestion-item button {
        width: auto;
        min-width: 64px;
        padding: 9px 10px;
      }

      .helper-text {
        margin-top: 12px;
        font-size: 13px;
        color: #b8bec9;
      }
    </style>
  </head>
  <body>
    <div class="popup-card">
      <h1>ReadFlow</h1>
      <p id="popupDescription">Save the current page and read it later.</p>

      <!-- Login view shown when there is no token -->
      <section id="loginSection" class="popup-section">
        <form id="loginForm" class="popup-form">
          <input
            id="emailInput"
            type="email"
            placeholder="Enter your email"
            required
          />
          <input
            id="passwordInput"
            type="password"
            placeholder="Enter your password"
            required
          />
          <button id="loginButton" type="submit">Login</button>
        </form>
        <p class="helper-text">Login once to enable quick article saving.</p>
      </section>

      <!-- Assistant view shown after login or after a gentle reading nudge -->
      <section id="assistantSection" class="popup-section">
        <div class="time-options" aria-label="Available reading time">
          <button class="time-button" type="button" data-minutes="5">5 min</button>
          <button class="time-button" type="button" data-minutes="10">
            10 min
          </button>
          <button class="time-button" type="button" data-minutes="30">
            30 min
          </button>
        </div>

        <div id="suggestionList" class="suggestion-list"></div>

        <button id="saveModeButton" type="button" class="secondary-button">
          Save Current Page
        </button>
        
      </section>

      <!-- Save view for quickly saving the current browser tab -->
      <section id="saveSection" class="popup-section">
        <button id="saveArticleButton" type="button">Save Article</button>
        <button id="assistantModeButton" type="button" class="secondary-button">
          Reading Suggestions
        </button>
        <button type="button" class="secondary-button logout-button">
          Logout
        </button>
      </section>

      <div id="message"></div>
    </div>

    <script src="api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
